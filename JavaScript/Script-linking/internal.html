<!DOCTYPE html>
<html>
<head>
    <title>Internal JavaScript Example</title>
</head>
<body>

    <h2 id="demo">Internal JavaScript Demo</h2>

    <button onclick="changeText()">Click Me</button>

    <script>
        function changeText() {
            document.getElementById("demo").innerHTML =
            "Internal JavaScript is working!";
        }
    </script>

</body>
</html>
