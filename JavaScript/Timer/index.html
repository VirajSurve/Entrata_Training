<!DOCTYPE html>
<html>
<head>
	<title>JavaScript Timing Functions Demo</title>
</head>
<body>

<h2>JavaScript Timing Functions Demo</h2>

<button onclick="showDelayedMessage()">Show Message After 3 Seconds</button>
<button onclick="stopDelayedMessage()">Cancel Delayed Message</button>

<br><br>

<button onclick="startCounter()">Start Counter</button>
<button onclick="stopCounter()">Stop Counter</button>

<br><br>

<button onclick="startClock()">Start Digital Clock</button>
<button onclick="stopClock()">Stop Digital Clock</button>

<p id="output"></p>
<p id="clock"></p>

<script src="script.js"></script>

</body>
</html>
